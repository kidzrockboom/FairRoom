name: PR Metadata

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

jobs:
  validate-pr-body:
    name: Validate PR body
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const missing = [];

            if (!/#\d+/.test(body)) {
              missing.push("at least one linked issue reference like #123");
            }

            if (!/Story IDs/i.test(body)) {
              missing.push("a Story IDs section");
            }

            if (!/Validation/i.test(body)) {
              missing.push("a Validation section");
            }

            if (missing.length > 0) {
              core.setFailed(
                `PR body is incomplete. Add ${missing.join(", ")} using the PR template.`
              );
            }
