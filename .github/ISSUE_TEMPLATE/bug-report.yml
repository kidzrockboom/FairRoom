name: Bug Report
description: Report a concrete defect tied to a story or implementation issue.
title: "[Bug] "
body:
  - type: input
    id: story_ids
    attributes:
      label: Story IDs
      placeholder: US-003
  - type: textarea
    id: bug
    attributes:
      label: What broke?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repo_areas
    attributes:
      label: Suspected repo areas
